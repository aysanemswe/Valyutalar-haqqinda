<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <script>
            // Valyuta (Dollar, Tenge, Rubl) --> Sum

            function dollarToUZ(money){
                // Dollar di Uzbek sumga aylandiriw
                console.log(`${money} dollar --> ${12_000 * money} Sum`)
            }

            function tengeToUZ(money){
                // Tenge ni Uzbek sumga aylandiriw
                console.log(`${money}tenge --> ${25 * money} Sum`)
            }

              function rublToUZ(money){
                // Rubl di Uzbek sumga aylandiriw
                console.log(`${money}rubl --> ${165 * money} Sum`)
            }

            dollarToUZ(50)
            tengeToUZ(200)
            rublToUZ(500)

        </script>
    </body>
</html>
